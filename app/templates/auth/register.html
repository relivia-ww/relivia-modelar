{% extends "base.html" %}
{% block title %}Criar conta — Relívia Modelar{% endblock %}

{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:24px;font-weight:800;color:var(--blue);margin-bottom:8px">Relívia Modelar</div>
      <div style="color:var(--muted);font-size:14px">Clone qualquer página. Edite. Publique.</div>
    </div>

    <div class="card">
      <h1 style="font-size:18px;font-weight:700;margin-bottom:24px">Criar conta</h1>
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Nome</label>
          <input type="text" name="name" class="form-input" placeholder="Seu nome" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Senha <span style="color:var(--muted);font-weight:400">(mínimo 8 caracteres)</span></label>
          <input type="password" name="password" class="form-input" placeholder="••••••••" required minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar senha</label>
          <input type="password" name="confirm_password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">Criar conta</button>
      </form>
    </div>

    <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted)">
      Já tem conta? <a href="{{ url_for('auth.login') }}">Entrar</a>
    </div>
  </div>
</div>
{% endblock %}
